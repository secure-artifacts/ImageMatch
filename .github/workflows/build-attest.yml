name: Build and Attest

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Get version tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME:-latest}" >> $GITHUB_OUTPUT

      - name: Package artifacts
        run: |
          tar -czf imagematch-frontend-${{ steps.version.outputs.tag }}.tar.gz -C frontend/dist .
          tar -czf imagematch-backend-${{ steps.version.outputs.tag }}.tar.gz \
            backend/main.py \
            backend/embedding.py \
            backend/vector_store.py \
            backend/requirements.txt \
            backend/routes/

      - name: Generate artifact attestation - Frontend
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: imagematch-frontend-${{ steps.version.outputs.tag }}.tar.gz

      - name: Generate artifact attestation - Backend
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: imagematch-backend-${{ steps.version.outputs.tag }}.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            imagematch-frontend-${{ steps.version.outputs.tag }}.tar.gz
            imagematch-backend-${{ steps.version.outputs.tag }}.tar.gz
          body: |
            ## ImageMatch ${{ steps.version.outputs.tag }}

            AI 图像相似度匹配应用

            ### 下载内容
            - `imagematch-frontend` - 前端构建产物
            - `imagematch-backend` - 后端源码

            ### 使用方法
            请参考 README.md 了解完整安装和使用说明。
          draft: false
          prerelease: false
