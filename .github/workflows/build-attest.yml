name: Build and Attest

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Package artifacts
        run: |
          # Package frontend build
          tar -czf imagematch-frontend-${{ github.ref_name || 'latest' }}.tar.gz -C frontend/dist .
          
          # Package backend source
          tar -czf imagematch-backend-${{ github.ref_name || 'latest' }}.tar.gz \
            backend/main.py \
            backend/embedding.py \
            backend/vector_store.py \
            backend/requirements.txt \
            backend/routes/

      - name: Generate artifact attestation (Frontend)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'imagematch-frontend-${{ github.ref_name || "latest" }}.tar.gz'

      - name: Generate artifact attestation (Backend)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'imagematch-backend-${{ github.ref_name || "latest" }}.tar.gz'

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            imagematch-frontend-${{ github.ref_name }}.tar.gz
            imagematch-backend-${{ github.ref_name }}.tar.gz
          body: |
            ## ImageMatch ${{ github.ref_name }}
            
            AI 图像相似度匹配应用
            
            ### 下载内容
            - `imagematch-frontend-${{ github.ref_name }}.tar.gz` - 前端构建产物
            - `imagematch-backend-${{ github.ref_name }}.tar.gz` - 后端源码
            
            ### 使用方法
            请参考 [README.md](https://github.com/secure-artifacts/ImageMatch/blob/main/README.md) 了解完整安装和使用说明。
          draft: false
          prerelease: false
